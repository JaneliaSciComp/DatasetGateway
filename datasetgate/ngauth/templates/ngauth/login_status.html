<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Status</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; text-decoration: none; color: white; background: #4285f4; border: none; cursor: pointer; }
    </style>
</head>
<body>
    {% if logged_in %}
        <h2>Logged in</h2>
        <p>You are logged in as <strong>{{ user_email }}</strong>.</p>
        <p>You may close this window.</p>
    {% else %}
        <h2>Not logged in</h2>
        <p><a href="/auth/login" class="btn">Login with Google</a></p>
    {% endif %}
</body>
</html>

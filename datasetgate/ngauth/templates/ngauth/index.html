<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatasetGate - Dataset Access</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .tos { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; text-decoration: none; color: white; background: #4285f4; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #3367d6; }
        .status { padding: 10px; background: #f0f0f0; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>DatasetGate</h1>

    {% if user_email %}
        <div class="status">
            Logged in as <strong>{{ user_email }}</strong>
            &mdash; <a href="/web/datasets">Go to Dashboard</a>
        </div>
    {% else %}
        <div class="status">
            Not logged in. <a href="/auth/login" class="btn">Login with Google</a>
        </div>
    {% endif %}

    {% if tos_documents %}
        <h2>Terms of Service</h2>
        {% for tos in tos_documents %}
            <div class="tos">
                <h3>{{ tos.name }}</h3>
                <div>{{ tos.text|safe }}</div>
            </div>
        {% endfor %}
    {% endif %}
</body>
</html>

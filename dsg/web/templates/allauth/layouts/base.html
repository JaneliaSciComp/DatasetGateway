<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block head_title %}DatasetGateway{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #333; }
        h1 { font-size: 1.5em; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; text-decoration: none; color: white; background: #4285f4; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #3367d6; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block body %}
        {% block content %}{% endblock %}
    {% endblock %}
    {% block extra_body %}{% endblock %}
</body>
</html>

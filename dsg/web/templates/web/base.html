<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DatasetGateway{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; color: #333; }
        nav { border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; }
        nav a { margin-right: 15px; text-decoration: none; color: #4285f4; }
        nav a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; background: #4285f4; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #3367d6; }
        .btn-danger { background: #d93025; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .alert { padding: 10px 15px; border-radius: 4px; margin: 10px 0; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        form.inline { display: inline; }
        input, select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>
    <nav>
        <strong>DatasetGateway</strong>
        {% if user %}
            <a href="/web/datasets">Datasets</a>
            <a href="/web/my-account">My Account</a>
            <span style="float: right; color: #666;">
                {{ user.email }}
                <form action="/web/logout" method="post" class="inline" style="margin-left: 10px;">
                    {% csrf_token %}
                    <button type="submit" style="background: none; border: none; color: #4285f4; cursor: pointer; font-size: inherit; padding: 0; text-decoration: none;">Logout</button>
                </form>
            </span>
        {% else %}
            <span style="float: right;">
                <a href="/auth/login" class="btn btn-sm">Login with Google</a>
            </span>
        {% endif %}
    </nav>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
